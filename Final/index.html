<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Cube Timer</title>
  <link rel="stylesheet" href="styles.css">

</head>

<body>
  <div id="app">
    <header>
      <div class="logo">⬛ CUBETIMER</div>
      <div class="session-stats">
        <div class="stat">
          <div class="stat-val" id="hdr-count">0</div>
          <div class="stat-lbl">Solves</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="hdr-best">—</div>
          <div class="stat-lbl">Best</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="hdr-mean">—</div>
          <div class="stat-lbl">Mean</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="hdr-ao5">—</div>
          <div class="stat-lbl">Ao5</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="hdr-ao12">—</div>
          <div class="stat-lbl">Ao12</div>
        </div>
      </div>
    </header>

    <div class="main">
      <div class="sidebar">
        <div class="sidebar-header">
          Times
          <button class="clear-btn" id="clearBtn">Clear</button>
        </div>
        <div class="times-list" id="timesList"></div>
      </div>

      <div class="center" id="centerArea">
        <!-- SCRAMBLE TOP -->
        <div class="scramble-area">
          <div class="scramble-label">Scramble</div>
          <div class="scramble-moves" id="scrambleMoves"></div>
          <button class="new-scramble-btn" id="newScrambleBtn">↻ New Scramble</button>
        </div>

        <!-- TIMER MIDDLE -->
        <div class="timer-area" id="timerArea">
          <div class="inspect-ring" id="inspectRing">
            <svg width="240" height="240">
              <circle class="inspect-progress" id="inspectArc" cx="120" cy="120" r="115" />
            </svg>
          </div>
          <div class="timer-display" id="timerDisplay">0.00</div>
          <div class="last-time-display" id="lastTimeDisplay"></div>
          <div class="timer-hint" id="timerHint">Hold SPACE to inspect</div>
          <div class="penalty-row" id="penaltyRow">
            <button class="pen-btn" id="pen-ok">OK</button>
            <button class="pen-btn" id="pen-plus2">+2</button>
            <button class="pen-btn" id="pen-dnf">DNF</button>
          </div>
        </div>

        <!-- BOTTOM STRIP -->
        <div class="bottom-strip">
          <!-- Cube Net -->
          <div class="cube-net-wrap">

          </div>

          <!-- Stats -->
          <div class="stats-panel">
            <div class="stats-title">Session Stats</div>
            <div class="stat-grid">
              <div class="stat-row"><span class="stat-row-lbl">Best</span><span class="stat-row-val green"
                  id="s-best">—</span></div>
              <div class="stat-row"><span class="stat-row-lbl">Worst</span><span class="stat-row-val red"
                  id="s-worst">—</span></div>
              <div class="stat-row"><span class="stat-row-lbl">Mean</span><span class="stat-row-val accent"
                  id="s-mean">—</span></div>
              <div class="stat-row"><span class="stat-row-lbl">Std Dev</span><span class="stat-row-val"
                  id="s-std">—</span></div>
            </div>
          </div>

          <!-- AO chips -->
          <div class="ao-chips">
            <div class="ao-chip">
              <div class="ao-chip-val" id="ao-ao5">—</div>
              <div class="ao-chip-lbl">Ao5</div>
            </div>
            <div class="ao-chip">
              <div class="ao-chip-val" id="ao-ao12">—</div>
              <div class="ao-chip-lbl">Ao12</div>
            </div>
            <div class="ao-chip">
              <div class="ao-chip-val" id="ao-ao25">—</div>
              <div class="ao-chip-lbl">Ao25</div>
            </div>
            <div class="ao-chip">
              <div class="ao-chip-val" id="ao-ao50">—</div>
              <div class="ao-chip-lbl">Ao50</div>
            </div>
          </div>

          <!-- Graph -->
          <div class="graph-wrap">
            <div class="graph-title">Last 15 Solves</div>
            <canvas id="graph"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
